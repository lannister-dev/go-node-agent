# go-node-agent — entry mode, dev
#
# Deploy:
#   helm upgrade --install go-node-agent-entry-dev deploy/helm/ \
#     -n vpn-dev -f deploy/helm/values.entry-dev.yaml

image:
  repository: harbor.lannister-dev.ru/vpn-service/go-node-agent
  tag: dev
  pullPolicy: Always

imagePullSecrets:
  - name: harbor-registry

nodeSelector:
  role: vpn
  channel: dev
  traffic_role: entry

hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet

env:
  controlApiURL: http://control-api-dev.vpn-dev.svc.cluster.local:8000
  natsURL: nats://nats.nats.svc.cluster.local:4222
  nodeRole: entry
  logLevel: debug
  logFormat: json
  heartbeatInterval: 10s
  natsCommandPrefix: dev.agent.placements
  natsResultPrefix: dev.agent.placement_results
  natsSnapshotPrefix: dev.agent.snapshots
  natsHeartbeatPrefix: dev.agent.heartbeats
  natsSyncReportPrefix: dev.agent.sync_reports
  natsNodesTrafficSubject: dev.nodes.traffic
  natsUsersTrafficSubject: dev.users.traffic

executor:
  enabled: true
  singbox:
    inboundTag: vless-reality-in
    listenAddress: "::"
    listenPort: 443
    logLevel: info

secrets:
  bootstrapTokenSecretName: go-node-agent-entry-dev-bootstrap
  bootstrapTokenSecretKey: token
  natsUrlSecretName: go-node-agent-entry-dev-bootstrap
  natsUrlSecretKey: NATS_URL

externalSecret:
  enabled: true
  storeName: vault
  vaultPath: go-node-agent/dev/env
  targetName: go-node-agent-entry-dev-bootstrap
  refreshInterval: 5m

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
  prometheus-env: dev
  prometheus-app: go-node-agent
  prometheus-role: entry

wg:
  enabled: true

entryProxy:
  enabled: true
  image:
    repository: harbor.lannister-dev.ru/vpn-service/entry-proxy
    tag: dev
    pullPolicy: Always
  reality:
    serverName: www.cloudflare.com
    handshakeServer: www.cloudflare.com
    handshakePort: 443
  secrets:
    realitySecretName: go-node-agent-entry-dev-bootstrap

probe:
  clientIDs:
    - 8add00c8-f944-4a7b-9839-e39c5eabdb6b
    - d0f7952d-7b4b-4478-9e7b-02915fe734f1
