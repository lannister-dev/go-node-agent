apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "go-node-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "go-node-agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "go-node-agent.selectorLabels" . | nindent 6 }}
  updateStrategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  template:
    metadata:
      labels:
        {{- include "go-node-agent.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "go-node-agent.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      hostNetwork: {{ .Values.hostNetwork }}
      dnsPolicy: {{ .Values.dnsPolicy }}
      {{- with .Values.dnsConfig }}
      dnsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: chown-store
          image: busybox:1.36
          command:
            - sh
            - -c
            - chown {{ .Values.podSecurityContext.fsGroup }}:{{ .Values.podSecurityContext.fsGroup }} /var/lib/go-node-agent && chmod 0750 /var/lib/go-node-agent
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - name: store
              mountPath: /var/lib/go-node-agent
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ include "go-node-agent.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- $sc := .Values.securityContext | deepCopy }}
            {{- if .Values.wg.enabled }}
            {{- $_ := set $sc "runAsNonRoot" false }}
            {{- $_ := set $sc "runAsUser" 0 }}
            {{- $_ := set $sc "readOnlyRootFilesystem" false }}
            {{- $caps := default (dict) (get $sc "capabilities") }}
            {{- $existing := default (list) (get $caps "add") }}
            {{- $_ := set $caps "add" (append (append $existing "NET_ADMIN") "DAC_OVERRIDE") }}
            {{- $_ := set $sc "capabilities" $caps }}
            {{- end }}
            {{- toYaml $sc | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.env.httpPort | default 8080 }}
              protocol: TCP
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: CONTROL_API_URL
              value: {{ .Values.env.controlApiURL | quote }}
            - name: NATS_URL
              {{- if .Values.secrets.natsUrlSecretName }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.natsUrlSecretName }}
                  key: {{ .Values.secrets.natsUrlSecretKey | default "NATS_URL" }}
              {{- else }}
              value: {{ .Values.env.natsURL | quote }}
              {{- end }}
            - name: NODE_ROLE
              value: {{ .Values.env.nodeRole | quote }}
            - name: NODE_KEY
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ required "secrets.bootstrapTokenSecretName required" .Values.secrets.bootstrapTokenSecretName }}
                  key: {{ .Values.secrets.bootstrapTokenSecretKey }}
            - name: LOG_LEVEL
              value: {{ .Values.env.logLevel | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.env.logFormat | quote }}
            - name: HTTP_ADDR
              value: {{ .Values.env.httpAddr | default ":8080" | quote }}
            - name: HEARTBEAT_INTERVAL
              value: {{ .Values.env.heartbeatInterval | quote }}
            - name: DRAIN_TIMEOUT
              value: {{ .Values.env.drainTimeout | quote }}
            - name: NATS_NAME
              value: "go-node-agent-$(NODE_NAME)"
            - name: NATS_COMMAND_PREFIX
              value: {{ .Values.env.natsCommandPrefix | quote }}
            - name: NATS_RESULT_PREFIX
              value: {{ .Values.env.natsResultPrefix | quote }}
            - name: NATS_SNAPSHOT_PREFIX
              value: {{ .Values.env.natsSnapshotPrefix | quote }}
            - name: NATS_HEARTBEAT_PREFIX
              value: {{ .Values.env.natsHeartbeatPrefix | quote }}
            - name: NATS_SYNC_REPORT_PREFIX
              value: {{ .Values.env.natsSyncReportPrefix | quote }}
            - name: NATS_NODES_TRAFFIC_SUBJECT
              value: {{ .Values.env.natsNodesTrafficSubject | default "nodes.traffic" | quote }}
            - name: NATS_USERS_TRAFFIC_SUBJECT
              value: {{ .Values.env.natsUsersTrafficSubject | default "users.traffic" | quote }}
            - name: STORE_PATH
              value: /var/lib/go-node-agent
            - name: HAPROXY_SOCKET
              value: /var/run/haproxy/{{ .Values.haproxy.socketName }}
            - name: SINGBOX_CONFIG_PATH
              value: {{ .Values.singbox.configPath | default "/var/lib/sing-box-shared/config.json" | quote }}
            - name: ENABLE_EXECUTOR
              value: {{ .Values.executor.enabled | quote }}
            - name: SINGBOX_INBOUND_TAG
              value: {{ .Values.executor.singbox.inboundTag | quote }}
            - name: SINGBOX_LISTEN_ADDRESS
              value: {{ .Values.executor.singbox.listenAddress | quote }}
            - name: SINGBOX_LISTEN_PORT
              value: {{ .Values.executor.singbox.listenPort | quote }}
            - name: SINGBOX_LOG_LEVEL
              value: {{ .Values.executor.singbox.logLevel | quote }}
            - name: BACKEND_DEFAULT_PORT
              value: {{ .Values.executor.backendDefaults.port | quote }}
            - name: BACKEND_DEFAULT_TRANSPORT
              value: {{ .Values.executor.backendDefaults.transport | quote }}
            - name: XRAY_GRPC_ADDR
              value: {{ .Values.executor.xray.grpcAddr | quote }}
            - name: XRAY_INBOUND_TAG
              value: {{ .Values.executor.xray.inboundTag | quote }}
            {{- with .Values.executor.xray.inboundTagWS }}
            - name: XRAY_INBOUND_TAG_WS
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.executor.xray.inboundTagReality }}
            - name: XRAY_INBOUND_TAG_REALITY
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.executor.xray.inboundTagXHTTP }}
            - name: XRAY_INBOUND_TAG_XHTTP
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.executor.xray.inboundTagTCP }}
            - name: XRAY_INBOUND_TAG_TCP
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.executor.xray.inboundTagWgInternal }}
            - name: XRAY_INBOUND_TAG_WG_INTERNAL
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.wg.enabled }}
            - name: WG_ENABLED
              value: "true"
            - name: WG_INTERFACE
              value: {{ .Values.wg.interface | quote }}
            - name: WG_KEY_DIR
              value: {{ .Values.wg.keyDir | quote }}
            - name: WG_LISTEN_PORT
              value: {{ .Values.wg.listenPort | quote }}
            {{- end }}
            {{- if .Values.entryProxy.enabled }}
            - name: SINGBOX_EMBEDDED
              value: "true"
            - name: ENTRY_PROXY_SOCKET
              value: {{ printf "%s/control.sock" .Values.entryProxy.socketDir | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          volumeMounts:
            - name: store
              mountPath: /var/lib/go-node-agent
            - name: haproxy-sock
              mountPath: /var/run/haproxy
            - name: singbox-config
              mountPath: /var/lib/sing-box-shared
              readOnly: false
            - name: tmp
              mountPath: /tmp
            {{- if .Values.entryProxy.enabled }}
            - name: entry-proxy-sock
              mountPath: {{ .Values.entryProxy.socketDir }}
            {{- end }}
        {{- if .Values.entryProxy.enabled }}
        - name: entry-proxy
          image: "{{ .Values.entryProxy.image.repository }}:{{ .Values.entryProxy.image.tag | default (include "go-node-agent.imageTag" .) }}"
          imagePullPolicy: {{ .Values.entryProxy.image.pullPolicy }}
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          ports:
            - name: vless
              containerPort: 443
              hostPort: 443
              protocol: TCP
          env:
            - name: ENTRY_LISTEN_ADDR
              value: {{ .Values.entryProxy.listenAddr | quote }}
            - name: ENTRY_PROXY_SOCKET
              value: {{ printf "%s/control.sock" .Values.entryProxy.socketDir | quote }}
            - name: REALITY_SERVER_NAME
              value: {{ .Values.entryProxy.reality.serverName | quote }}
            - name: REALITY_HANDSHAKE_SERVER
              value: {{ .Values.entryProxy.reality.handshakeServer | quote }}
            - name: REALITY_HANDSHAKE_PORT
              value: {{ .Values.entryProxy.reality.handshakePort | quote }}
            - name: REALITY_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.entryProxy.secrets.realitySecretName }}
                  key: reality_private_key
            - name: REALITY_SHORT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.entryProxy.secrets.realitySecretName }}
                  key: reality_short_id
          resources:
            {{- toYaml .Values.entryProxy.resources | nindent 12 }}
          volumeMounts:
            - name: entry-proxy-sock
              mountPath: {{ .Values.entryProxy.socketDir }}
        {{- end }}
      volumes:
        - name: store
          hostPath:
            path: {{ .Values.storage.hostPath }}
            type: DirectoryOrCreate
        - name: haproxy-sock
          hostPath:
            path: {{ .Values.haproxy.socketHostPath }}
            type: DirectoryOrCreate
        - name: singbox-config
          hostPath:
            path: {{ .Values.singbox.configHostPath }}
            type: DirectoryOrCreate
        - name: tmp
          emptyDir: {}
        {{- if .Values.entryProxy.enabled }}
        - name: entry-proxy-sock
          emptyDir: {}
        {{- end }}
