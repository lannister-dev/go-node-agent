# go-node-agent — entry mode, prod (embedded VLESS+REALITY proxy)
#
# Deploy:
#   helm upgrade --install go-node-agent-entry-prod deploy/helm/ \
#     -n vpn-prod -f deploy/helm/values.entry-prod.yaml

image:
  repository: harbor.lannister-dev.ru/vpn-service/go-node-agent
  tag: prod
  pullPolicy: Always

imagePullSecrets:
  - name: harbor-registry

nodeSelector:
  role: vpn
  channel: prod
  traffic_role: entry

hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet

env:
  controlApiURL: http://control-api.vpn-prod.svc.cluster.local:8000
  natsURL: nats://nats.nats.svc.cluster.local:4222
  nodeRole: entry
  logLevel: info
  logFormat: json
  heartbeatInterval: 10s
  natsCommandPrefix: prod.agent.placements
  natsResultPrefix: prod.agent.placement_results
  natsSnapshotPrefix: prod.agent.snapshots
  natsHeartbeatPrefix: prod.agent.heartbeats
  natsSyncReportPrefix: prod.agent.sync_reports
  natsNodesTrafficSubject: prod.nodes.traffic
  natsUsersTrafficSubject: prod.users.traffic

executor:
  enabled: true
  singbox:
    inboundTag: vless-reality-in
    listenAddress: "::"
    listenPort: 443
    logLevel: info

secrets:
  bootstrapTokenSecretName: go-node-agent-entry-prod-bootstrap
  bootstrapTokenSecretKey: token
  natsUrlSecretName: go-node-agent-entry-prod-bootstrap
  natsUrlSecretKey: NATS_URL

externalSecret:
  enabled: true
  storeName: vault
  vaultPath: go-node-agent/prod/env
  targetName: go-node-agent-entry-prod-bootstrap
  refreshInterval: 5m

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
  prometheus-env: prod
  prometheus-app: go-node-agent
  prometheus-role: entry

wg:
  enabled: true

entryProxy:
  enabled: true
  image:
    repository: harbor.lannister-dev.ru/vpn-service/entry-proxy
    tag: prod
    pullPolicy: Always
  reality:
    serverName: yastatic.net
    handshakeServer: yastatic.net
    handshakePort: 443
  secrets:
    realitySecretName: go-node-agent-entry-prod-bootstrap
