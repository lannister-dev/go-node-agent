# go-node-agent — backend mode, dev
#
# Deploy:
#   helm upgrade --install go-node-agent-backend-dev deploy/helm/ \
#     -n vpn-dev -f deploy/helm/values.backend-dev.yaml

image:
  repository: harbor.lannister-dev.ru/vpn-service/go-node-agent
  tag: dev
  pullPolicy: Always

imagePullSecrets:
  - name: harbor-registry

hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet

nodeSelector:
  role: vpn
  channel: dev

# Avoid scheduling on entry/whitelist-entry nodes; mirrors the Python agent's
# backend-mode placement in chart/values/dev.yaml.
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: traffic_role
              operator: NotIn
              values:
                - entry
                - whitelist_entry

env:
  controlApiURL: http://control-api-dev.vpn-dev.svc.cluster.local:8000
  natsURL: nats://nats.nats.svc.cluster.local:4222
  nodeRole: backend
  httpAddr: ":9095"
  httpPort: 9095
  logLevel: debug
  logFormat: json
  heartbeatInterval: 10s
  natsCommandPrefix: dev.agent.placements
  natsResultPrefix: dev.agent.placement_results
  natsSnapshotPrefix: dev.agent.snapshots
  natsHeartbeatPrefix: dev.agent.heartbeats
  natsSyncReportPrefix: dev.agent.sync_reports
  natsNodesTrafficSubject: dev.nodes.traffic
  natsUsersTrafficSubject: dev.users.traffic

executor:
  enabled: true
  xray:
    grpcAddr: $(NODE_IP):10085
    inboundTag: vless-ws  # fallback when transport-specific tag below missing
    inboundTagWS: vless-ws
    inboundTagReality: vless-reality
    inboundTagXHTTP: vless-xhttp
    inboundTagTCP: vless-tcp
    inboundTagWgInternal: vless-wg-internal

secrets:
  bootstrapTokenSecretName: go-node-agent-backend-dev-bootstrap
  bootstrapTokenSecretKey: token
  natsUrlSecretName: go-node-agent-backend-dev-bootstrap
  natsUrlSecretKey: NATS_URL

externalSecret:
  enabled: true
  storeName: vault
  vaultPath: go-node-agent/dev/env
  targetName: go-node-agent-backend-dev-bootstrap
  refreshInterval: 5m

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
  prometheus-env: dev
  prometheus-app: go-node-agent
  prometheus-role: backend

wg:
  enabled: true

probe:
  clientIDs:
    - 8add00c8-f944-4a7b-9839-e39c5eabdb6b
    - d0f7952d-7b4b-4478-9e7b-02915fe734f1
