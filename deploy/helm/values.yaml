image:
  repository: harbor.lannister-dev.ru/vpn-service/go-node-agent
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: harbor-registry

nameOverride: ""
fullnameOverride: ""

nodeSelector:
  role: vpn
  channel: dev

affinity: {}

tolerations:
  - key: dedicated
    operator: Equal
    value: vpn
    effect: NoSchedule
priorityClassName: ""
hostNetwork: false
dnsPolicy: ClusterFirst
dnsConfig:
  options:
    - name: ndots
      value: "2"
    - name: timeout
      value: "2"
    - name: attempts
      value: "5"

podLabels: {}
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

podSecurityContext:
  fsGroup: 65532

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  controlApiURL: ""
  natsURL: nats://nats.nats.svc.cluster.local:4222
  nodeRole: entry
  logLevel: info
  logFormat: json
  heartbeatInterval: 10s
  drainTimeout: 30s
  natsCommandPrefix: agent.placements
  natsResultPrefix: agent.placement_results
  natsSnapshotPrefix: agent.snapshots
  natsHeartbeatPrefix: agent.heartbeats
  natsSyncReportPrefix: agent.sync_reports

wg:
  enabled: false
  interface: wg0
  keyDir: /var/lib/go-node-agent/wg
  listenPort: 4500

executor:
  enabled: false
  singbox:
    inboundTag: vless-in
    listenAddress: "::"
    listenPort: 443
    logLevel: info
  backendDefaults:
    port: 10100
    transport: ws
  xray:
    grpcAddr: 127.0.0.1:10085
    inboundTag: vless-in

secrets:
  bootstrapTokenSecretName: ""
  bootstrapTokenSecretKey: bootstrap_token
  nodeKeySecretName: ""
  nodeKeySecretKey: node_key
  natsUrlSecretName: ""
  natsUrlSecretKey: NATS_URL

externalSecret:
  enabled: false
  storeName: vault
  vaultPath: ""
  targetName: ""
  refreshInterval: 5m

storage:
  hostPath: /var/lib/go-node-agent

haproxy:
  socketHostPath: /var/run/haproxy
  socketName: admin.sock

# client_ids of the probe/monitoring agent, excluded from user counters
probe:
  clientIDs: []

singbox:
  configHostPath: /var/lib/sing-box-shared

entryProxy:
  enabled: false
  image:
    repository: harbor.lannister-dev.ru/vpn-service/entry-proxy
    tag: ""
    pullPolicy: IfNotPresent
  socketDir: /var/run/entry-proxy
  listenAddr: ":443"
  reality:
    serverName: www.cloudflare.com
    handshakeServer: www.cloudflare.com
    handshakePort: 443
  secrets:
    # secret with keys: reality_private_key, reality_short_id
    realitySecretName: ""
  # GOMEMLIMIT is a soft heap ceiling kept below the cgroup limit so the GC
  # reclaims hard instead of OOMKilling (which would drop every live session).
  # Keep it ~85% of resources.limits.memory.
  goMemLimit: "220MiB"
  gogc: "" # empty = Go default (100); lower (e.g. "50") trades CPU for lower RSS
  debugAddr: "" # e.g. ":6060" to expose pprof/memstats for profiling
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

probes:
  liveness:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3
  startup:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 30

service:
  enabled: true
  type: ClusterIP
  port: 8080

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
