name: Deploy Go-Node-Agent Dev

on:
  push:
    branches:
      - dev

concurrency:
  group: go-node-agent-dev-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  tests:
    uses: ./.github/workflows/tests.yml

  deploy:
    needs: tests
    runs-on: [self-hosted, dev]
    environment:
      name: development
    env:
      IMAGE_NAME: go-node-agent
      IMAGE_CHANNEL_TAG: dev
      NAMESPACE: vpn-dev
    steps:
      - uses: actions/checkout@v4

      - name: Prepare runtime
        uses: ./.github/workflows/runtime

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image metadata
        run: |
          set -Eeuo pipefail
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${HARBOR_URL}/${HARBOR_PROJECT}/${IMAGE_NAME}:${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "IMAGE_REF_CHANNEL=${HARBOR_URL}/${HARBOR_PROJECT}/${IMAGE_NAME}:${IMAGE_CHANNEL_TAG}" >> "$GITHUB_ENV"

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_REF }},${{ env.IMAGE_REF_CHANNEL }}
          build-args: |
            VERSION=${{ env.IMAGE_TAG }}
            COMMIT=${{ github.sha }}
          provenance: false

      - name: Prune buildx cache to save runner disk
        if: always()
        run: docker buildx prune -af --filter "until=24h" || true

      - name: Ensure namespace
        run: kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Update Harbor pull secret
        run: |
          set -Eeuo pipefail
          kubectl create secret docker-registry harbor-registry \
            --docker-server="${HARBOR_URL}" \
            --docker-username="${HARBOR_USERNAME}" \
            --docker-password="${HARBOR_PASSWORD}" \
            -n "${NAMESPACE}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy go-node-agent backend (dev)
        run: |
          set -Eeuo pipefail
          helm upgrade --install go-node-agent-backend-dev deploy/helm/ \
            -n "${NAMESPACE}" \
            -f deploy/helm/values.backend-dev.yaml \
            --set image.repository="${HARBOR_URL}/${HARBOR_PROJECT}/${IMAGE_NAME}" \
            --set image.tag="${IMAGE_TAG}" \
            --set "imagePullSecrets[0].name=harbor-registry" \
            --wait --timeout 5m

      - name: Deploy go-node-agent entry (dev)
        run: |
          set -Eeuo pipefail
          helm upgrade --install go-node-agent-entry-dev deploy/helm/ \
            -n "${NAMESPACE}" \
            -f deploy/helm/values.entry-dev.yaml \
            --set image.repository="${HARBOR_URL}/${HARBOR_PROJECT}/${IMAGE_NAME}" \
            --set image.tag="${IMAGE_TAG}" \
            --set "imagePullSecrets[0].name=harbor-registry" \
            --wait --timeout 5m
