name: PR Dev Tests

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: pr-dev-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  tests:
    if: ${{ !github.event.pull_request.draft }}
    uses: ./.github/workflows/tests.yml
